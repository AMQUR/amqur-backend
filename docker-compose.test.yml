# Disposable local test stack — NEVER point at Railway/production.
# Ports chosen to avoid colliding with common local 5432/6379/3000.
name: amqur-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: amqur_test
      POSTGRES_PASSWORD: amqur_test_pw
      POSTGRES_DB: amqur_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amqur_test -d amqur_test"]
      interval: 3s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  mock-crm:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./test-infra/mocks:/app:ro
    command: ["node", "mock-crm.mjs"]
    ports:
      - "18081:8081"
    environment:
      PORT: "8081"
      FAIL_MODE: "none"

  mock-inventory:
    image: nginx:1.27-alpine
    ports:
      - "18082:80"
    volumes:
      - ./test-infra/fixtures/inventory:/usr/share/nginx/html:ro
      - ./test-infra/nginx/inventory.conf:/etc/nginx/conf.d/default.conf:ro

  mock-parts-service:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./test-infra/mocks:/app:ro
    command: ["node", "mock-parts-service.mjs"]
    ports:
      - "18083:8083"
    environment:
      PORT: "8083"

  widget-host:
    image: nginx:1.27-alpine
    ports:
      - "18084:80"
    volumes:
      - ../amqur-widget/dist:/usr/share/nginx/html/dist:ro
      - ./test-infra/nginx/widget-host.html:/usr/share/nginx/html/index.html:ro
      - ./test-infra/nginx/widget.conf:/etc/nginx/conf.d/default.conf:ro
